services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile

    command: sleep infinity

    privileged: true

    environment:
      CLAUDE_CONFIG_DIR: /home/hypnos/.claude
      RC_NAME: clade

    volumes:
      - command.history:/commandhistory
      - go.cache.mod:/go/pkg/mod
      - go.cache.bin:/home/hypnos/.cache/go-build

      - ..:/workspace
      - ${HOME}/workspaces:/workspaces
      - ${HOME}/.claude:/home/hypnos/.claude

    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
        reservations:
          cpus: "2"
          memory: 4G

volumes:
  command.history:
  go.cache.mod:
  go.cache.bin:
