source:
  kind: container
  repo: docker.io/library/golang
select:
  kind: semver
  last-major: 2
  last-minor: 3
build:
  repo: ghcr.io/lesomnus/dev-golang
  tags:
    - "{{.Major}}.{{.Minor}}.{{.Patch}}"
    - "{{.Major}}.{{.Minor}}"
    - "{{.Major}}"
  platforms:
    - linux/amd64
    - linux/arm64
