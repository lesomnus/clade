# Track the latest alpine-based golang upstreams and rebuild a dev image on top.
parent:
  repo: docker.io/library/golang
  target:
    kind: semver
    last-major: 2
    last-minor: 3
build:
  repo: ghcr.io/lesomnus/dev-golang
  tag: "{{.Major}}.{{.Minor}}.{{.Patch}}"

  kind: build
  dockerfile: Dockerfile
  context: .
  platforms:
    - linux/amd64
    - linux/arm64
